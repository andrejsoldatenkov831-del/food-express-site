<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Адмінка</title>
    <style>
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #eee; }
    </style>
</head>
<body>
    <h1>Нові замовлення</h1>
    <table>
        <thead>
            <tr>
                <th>Клієнт</th>
                <th>Адреса</th>
                <th>Товари</th>
                <th>Сума</th>
            </tr>
        </thead>
        <tbody id="admin-table"></tbody>
    </table>

<script>
    async function loadOrders() {
        try {
            const res = await fetch('/api/admin/orders');
            const data = await res.json();
            const table = document.getElementById('admin-table');
            table.innerHTML = "";

            data.forEach(order => {
                let itemsList = "";
                try {
                    const parsedItems = JSON.parse(order.items);
                    itemsList = parsedItems.map(i => i.name).join(", ");
                } catch(e) { itemsList = order.items; }

                table.innerHTML += `
                    <tr>
                        <td>${order.customer_name}<br>${order.phone}</td>
                        <td>${order.address}</td>
                        <td>${itemsList}</td>
                        <td>${order.total_price} грн</td>
                    </tr>
                `;
            });
        } catch (e) { console.error("Помилка завантаження", e); }
    }
    loadOrders();
    setInterval(loadOrders, 10000); // Оновлення кожні 10 сек
</script>
</body>
</html>

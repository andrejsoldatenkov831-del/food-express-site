<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Панель адміністратора - Food Express</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 30px; }
        .admin-container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; color: #555; }
        tr:hover { background-color: #f1f1f1; }
        .items-list { font-size: 0.9em; color: #666; }
        .status-badge { padding: 5px 10px; border-radius: 15px; background: #e1f5fe; color: #01579b; font-size: 0.8em; }
        .refresh-btn { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; float: right; }
        .refresh-btn:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="admin-container">
    <button class="refresh-btn" onclick="fetchOrders()">Оновити список</button>
    <h1>Керування замовленнями</h1>
    
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Дата</th>
                <th>Клієнт / Телефон</th>
                <th>Адреса</th>
                <th>Товари</th>
                <th>Сума</th>
            </tr>
        </thead>
        <tbody id="orders-table-body">
            </tbody>
    </table>
</div>

<script>
    async function fetchOrders() {
        const tbody = document.getElementById('orders-table-body');
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Завантаження...</td></tr>';

        try {
            // Звертаємося до твого сервера на Render
            const response = await fetch('/api/admin/orders');
            const orders = await response.json();

            if (orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Замовлень поки немає</td></tr>';
                return;
            }

            tbody.innerHTML = ''; // Очищуємо таблицю

            orders.forEach(order => {
                // Парсимо товари (вони збережені як JSON-рядок)
                let itemsHtml = '';
                try {
                    const items = JSON.parse(order.items);
                    itemsHtml = items.map(i => `${i.name}`).join(', ');
                } catch (e) {
                    itemsHtml = order.items;
                }

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>#${order.id}</td>
                    <td>${order.date}</td>
                    <td>
                        <strong>${order.customer_name}</strong><br>
                        <small>${order.phone}</small>
                    </td>
                    <td>${order.address}</td>
                    <td class="items-list">${itemsHtml}</td>
                    <td><strong>${order.total_price} грн</strong></td>
                `;
                tbody.appendChild(row);
            });
        } catch (error) {
            console.error('Помилка:', error);
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:red;">Не вдалося завантажити дані</td></tr>';
        }
    }

    // Завантажуємо при відкритті сторінки
    fetchOrders();

    // Оновлюємо кожні 30 секунд автоматично
    setInterval(fetchOrders, 30000);
</script>

</body>
</html>

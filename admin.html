<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Панель адміністратора</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f4f4f4; }
        tr:nth-child(even) { background: #fafafa; }
    </style>
</head>
<body>
    <h1>Усі замовлення</h1>
    <button onclick="loadOrders()">Оновити дані</button>
    
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Дата</th>
                <th>Клієнт</th>
                <th>Товари</th>
                <th>Сума</th>
            </tr>
        </thead>
        <tbody id="orders-table"></tbody>
    </table>

    <script>
        async function loadOrders() {
            const tbody = document.getElementById('orders-table');
            try {
                const response = await fetch('/api/admin/orders');
                const orders = await response.json();
                
                tbody.innerHTML = '';
                orders.forEach(order => {
                    const items = JSON.parse(order.items).map(i => i.name).join(', ');
                    tbody.innerHTML += `
                        <tr>
                            <td>${order.id}</td>
                            <td>${order.date}</td>
                            <td>${order.customer_name} (${order.phone})<br>${order.address}</td>
                            <td>${items}</td>
                            <td>${order.total_price} грн</td>
                        </tr>
                    `;
                });
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="5">Помилка завантаження замовлень. Перевірте, чи працює сервер.</td></tr>';
            }
        }
        loadOrders();
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Панель</title>
    <meta charset="UTF-8">
</head>
<body style="background: #f4f4f4; padding: 20px;">
    <h1>Адмін-панель</h1>
    <div id="orders-list">Завантаження замовлень...</div>
    <script>
        async function load() {
            const res = await fetch('/api/admin/orders');
            const data = await res.json();
            document.getElementById('orders-list').innerHTML = JSON.stringify(data);
        }
        load();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Food Express — Меню</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; }
        .grid { display: flex; justify-content: center; gap: 20px; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; width: 250px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card img { width: 100%; border-radius: 8px; }
        button { background: #ff4757; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .nav { background: #2f3542; padding: 15px; }
        .nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">Меню</a>
        <a href="st3.html">Кошик</a>
        <a href="admin.html">Адмін</a>
    </div>

    <h1>Наше Меню</h1>
    <div class="grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=300" alt="Піца">
            <h3>Піца Маргарита</h3>
            <p>190 грн</p>
            <button onclick="addToCart('Піца Маргарита', 190)">В кошик</button>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300" alt="Бургер">
            <h3>Чізбургер XL</h3>
            <p>145 грн</p>
            <button onclick="addToCart('Чізбургер XL', 145)">В кошик</button>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=300" alt="Кола">
            <h3>Кола 0.5</h3>
            <p>45 грн</p>
            <button onclick="addToCart('Кола 0.5', 45)">В кошик</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню | FoodExpress</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #fff; margin: 0; padding-top: 80px; }
        .header-nav { position: fixed; top: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 15px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-item { text-decoration: none; color: #333; font-weight: bold; padding: 10px 25px; border-radius: 25px; transition: 0.3s; }
        .nav-item.active { background: #fff0f0; color: #ff5c5c; }
        
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .card { background: #fff; border-radius: 24px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.08); margin-bottom: 25px; }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-body { padding: 25px; text-align: left; }
        .card-title { font-size: 24px; font-weight: 800; margin: 0; color: #1a1a1a; }
        .card-text { color: #888; margin: 10px 0 20px 0; font-size: 15px; }
        .card-price { font-size: 26px; font-weight: 800; color: #ff5c5c; margin-bottom: 20px; }
        
        .btn-add { background: #ff5c5c; color: #fff; border: none; width: 100%; padding: 18px; border-radius: 18px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-add:active { transform: scale(0.96); }
    </style>
</head>
<body>

<div class="header-nav">
    <a href="/" class="nav-item">Головна</a>
    <a href="/" class="nav-item active">Меню</a>
    <a href="st3.html" class="nav-item">Оформити</a>
</div>

<div class="container">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1627626775846-122b778965ae?w=600" alt="Піца Пепероні">
        <div class="card-body">
            <h3 class="card-title">Піца "Пепероні"</h3>
            <p class="card-text">Гостра та соковита з салямі</p>
            <div class="card-price">220 грн</div>
            <button class="btn-add" onclick="addToCart('Піца Пепероні', 220)">Додати у кошик</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600" alt="Бургер">
        <div class="card-body">
            <h3 class="card-title">Чізбургер XL</h3>
            <p class="card-text">З подвійною котлетою та чедером</p>
            <div class="card-price">145 грн</div>
            <button class="btn-add" onclick="addToCart('Чізбургер XL', 145)">Додати у кошик</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>

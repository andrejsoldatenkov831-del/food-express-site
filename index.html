<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Food Express | Premium Delivery</title>
    <style>
        :root { --main-color: #ff4757; --sec-color: #2f3542; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f1f2f6; }
        
        .hero { background: var(--sec-color); color: white; padding: 60px 20px; text-align: center; clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%); }
        .hero h1 { font-size: 3rem; margin: 0; animation: slideDown 0.8s ease; }
        
        .container { max-width: 1200px; margin: -40px auto 40px; padding: 20px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.4s; position: relative; opacity: 0; animation: fadeInUp 0.6s forwards; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(255, 71, 87, 0.2); }
        
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-content { padding: 20px; text-align: center; }
        .price { font-size: 1.5rem; color: var(--main-color); font-weight: bold; margin: 10px 0; }
        
        .btn-add { background: var(--main-color); color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%; }
        .btn-add:hover { background: #ff6b81; letter-spacing: 1px; }

        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeInUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="hero">
        <h1>FOOD EXPRESS</h1>
        <p>Найшвидша доставка твого міста</p>
    </div>
    
    <div class="container">
        <div class="menu-grid">
            <div class="card" style="animation-delay: 0.2s">
                <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500" alt="Pizza">
                <div class="card-content">
                    <h3>Піца Маргарита</h3>
                    <div class="price">190 грн</div>
                    <button class="btn-add" onclick="addToCart('Піца Маргарита', 190)">В КОШИК</button>
                </div>
            </div>
            <div class="card" style="animation-delay: 0.4s">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500" alt="Burger">
                <div class="card-content">
                    <h3>Чізбургер XL</h3>
                    <div class="price">145 грн</div>
                    <button class="btn-add" onclick="addToCart('Чізбургер XL', 145)">В КОШИК</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

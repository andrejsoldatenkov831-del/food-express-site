<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Оформлення замовлення - Food Express</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .order-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; }
        .total { font-size: 20px; font-weight: bold; margin-top: 20px; text-align: right; }
        form { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 15px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #218838; }
        #empty-msg { text-align: center; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h2>Ваше замовлення</h2>
    
    <div id="order-items-list">
        <p id="empty-msg">Завантаження кошика...</p>
    </div>

    <div class="total">Разом: <span id="total-price">0</span> грн</div>

    <form id="order-form">
        <h3>Дані для доставки</h3>
        <input type="text" id="name" placeholder="Ваше ім'я" required>
        <input type="tel" id="phone" placeholder="Номер телефону" required>
        <input type="text" id="address" placeholder="Адреса доставки" required>
        <button type="submit">Підтвердити замовлення</button>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const listElement = document.getElementById('order-items-list');
    const totalElement = document.getElementById('total-price');
    const orderForm = document.getElementById('order-form');

    // 1. Отримуємо товари з localStorage
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    if (cart.length === 0) {
        listElement.innerHTML = '<p id="empty-msg">Кошик порожній. Поверніться в меню.</p>';
        return;
    }

    // 2. Виводимо список товарів
    listElement.innerHTML = '';
    let total = 0;

    cart.forEach(item => {
        const div = document.createElement('div');
        div.className = 'order-item';
        div.innerHTML = `<span>${item.name}</span> <span>${item.price} грн</span>`;
        listElement.appendChild(div);
        total += Number(item.price);
    });

    totalElement.innerText = total;

    // 3. Відправка замовлення на сервер
    orderForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const orderData = {
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            address: document.getElementById('address').value,
            items: cart,
            total: total
        };

        try {
            // ВАЖЛИВО: Використовуй відносний шлях, щоб працювало і на Render, і локально
            const response = await fetch('/api/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            });

            if (response.ok) {
                alert('Дякуємо! Замовлення прийнято.');
                localStorage.removeItem('cart'); // Очищуємо кошик після успіху
                window.location.href = '/'; // Повертаємо на головну
            } else {
                alert('Помилка сервера. Спробуйте пізніше.');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Не вдалося з’єднатися з сервером.');
        }
    });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ваше замовлення | FoodExpress</title>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .order-container { 
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(15px); 
            padding: 35px; 
            border-radius: 35px; 
            width: 90%; 
            max-width: 420px; 
            color: white; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h2 { text-align: center; font-size: 28px; margin-bottom: 30px; font-weight: 800; }
        .cart-list { margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 15px; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 16px; }
        .total-row { text-align: right; font-size: 22px; font-weight: 900; margin-bottom: 25px; }
        
        .input-field { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: bold; color: #ffff00; }
        input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: none; 
            background: #eef3ff; 
            font-size: 16px; 
            color: #333;
            box-sizing: border-box;
        }
        input::placeholder { color: #aaa; }

        .confirm-btn { 
            background: #fff000; 
            color: #333; 
            border: none; 
            width: 100%; 
            padding: 18px; 
            border-radius: 40px; 
            font-weight: 900; 
            font-size: 18px; 
            cursor: pointer; 
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(255, 240, 0, 0.3);
            transition: 0.3s;
        }
        .confirm-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>

<div class="order-container">
    <h2>Ваше замовлення</h2>
    
    <div id="items-list" class="cart-list">
        </div>
    
    <div class="total-row" id="final-price">Разом: 0 грн</div>

    <div class="input-field">
        <label>Ваше ім'я</label>
        <input type="text" id="cust_name" placeholder="Введіть ваше ім'я">
    </div>

    <div class="input-field">
        <label>Номер телефону</label>
        <input type="tel" id="cust_phone" placeholder="1111111">
    </div>

    <div class="input-field">
        <label>Адреса доставки</label>
        <input type="text" id="cust_address" placeholder="Введіть адресу">
    </div>

    <button class="confirm-btn" onclick="submitOrder()">ПІДТВЕРДИТИ</button>
</div>

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформлення замовлення</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .order-box { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px); padding: 40px; border-radius: 30px; width: 100%; max-width: 400px; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        h2 { text-align: center; margin-bottom: 25px; font-weight: 800; }
        .items-display { border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 20px; padding-bottom: 10px; }
        .item-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 16px; }
        .total-price { text-align: right; font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 25px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #ffff00; font-weight: bold; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: none; margin-bottom: 20px; box-sizing: border-box; background: #f0f4ff; }
        .confirm-btn { background: #ffff00; color: #333; border: none; width: 100%; padding: 18px; border-radius: 40px; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>

<div class="order-box">
    <h2>Ваше замовлення</h2>
    
    <div id="cart-items-display" class="items-display"></div>
    
    <div class="total-price" id="total-price-display">Разом: 0 грн</div>

    <label>Ваше ім'я</label>
    <input type="text" id="order-name" placeholder="Введіть ваше ім'я">

    <label>Номер телефону</label>
    <input type="text" id="order-phone" placeholder="+380">

    <label>Адреса доставки</label>
    <input type="text" id="order-address" placeholder="Введіть адресу">

    <button class="confirm-btn" onclick="sendOrderData()">ПІДТВЕРДИТИ</button>
</div>

<script>
    const cartData = JSON.parse(sessionStorage.getItem('cart')) || [];
    const display = document.getElementById('cart-items-display');
    const totalDisplay = document.getElementById('total-price-display');
    let sum = 0;

    if (cartData.length === 0) {
        display.innerHTML = '<p style="text-align:center; opacity:0.7;">Кошик порожній</p>';
    } else {
        cartData.forEach(item => {
            display.innerHTML += `
                <div class="item-row">
                    <span>${item.name}</span>
                    <span>${item.price} грн</span>
                </div>`;
            sum += item.price;
        });
    }
    totalDisplay.innerText = `Разом: ${sum} грн`;

    async function sendOrderData() {
        const name = document.getElementById('order-name').value;
        const phone = document.getElementById('order-phone').value;
        const address = document.getElementById('order-address').value;

        if (!name || !phone || !address || cartData.length === 0) {
            alert("Заповніть форму та додайте страви!");
            return;
        }

        const response = await fetch('/api/order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, phone, address, items: cartData, total: sum })
        });

        if (response.ok) {
            alert("Замовлення відправлено!");
            sessionStorage.removeItem('cart');
            window.location.href = '/';
        } else {
            alert("Помилка сервера");
        }
    }
</script>
</body>
</html>

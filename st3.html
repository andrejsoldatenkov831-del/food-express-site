<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Оформлення</title>
</head>
<body style="font-family: sans-serif; padding: 20px;">
    <h2>Ваше замовлення:</h2>
    <div id="items-list"></div>
    <hr>
    <form id="orderForm">
        <input type="text" id="name" placeholder="Ім'я" required><br><br>
        <input type="tel" id="phone" placeholder="Телефон" required><br><br>
        <input type="text" id="addr" placeholder="Адреса" required><br><br>
        <button type="submit">Замовити</button>
    </form>

    <script>
        const list = document.getElementById('items-list');
        let cart = JSON.parse(sessionStorage.getItem('cart')) || [];
        let total = 0;

        cart.forEach(i => {
            list.innerHTML += `<p>${i.name} — ${i.price} грн</p>`;
            total += i.price;
        });

        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: document.getElementById('name').value,
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('addr').value,
                    items: cart,
                    total: total
                })
            });
            if (res.ok) {
                alert("Замовлення прийнято!");
                sessionStorage.clear();
                window.location.href = "/";
            }
        };
    </script>
</body>
</html>

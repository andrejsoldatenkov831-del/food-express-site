<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Оформлення замовлення</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .order-container { max-width: 500px; margin: auto; border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
        .item { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        form { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        input { padding: 8px; }
        button { padding: 10px; background: green; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="order-container">
    <h2>Ваше замовлення</h2>
    <div id="cart-items"></div>
    <p><strong>Разом: <span id="total-price">0</span> грн</strong></p>

    <form id="checkout-form">
        <input type="text" id="cust-name" placeholder="Ваше ім'я" required>
        <input type="tel" id="cust-phone" placeholder="Телефон" required>
        <input type="text" id="cust-addr" placeholder="Адреса доставки" required>
        <button type="submit">Підтвердити замовлення</button>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const cartItemsContainer = document.getElementById('cart-items');
    const totalPriceElement = document.getElementById('total-price');
    
    // Читаємо дані з того самого ключа 'cart'
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let total = 0;

    if (cart.length === 0) {
        cartItemsContainer.innerHTML = "<p>Кошик порожній</p>";
    } else {
        cart.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<span>${item.name}</span><span>${item.price} грн</span>`;
            cartItemsContainer.appendChild(div);
            total += item.price;
        });
    }
    totalPriceElement.innerText = total;

    // Відправка на сервер
    document.getElementById('checkout-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const data = {
            name: document.getElementById('cust-name').value,
            phone: document.getElementById('cust-phone').value,
            address: document.getElementById('cust-addr').value,
            items: cart,
            total: total
        };

        const response = await fetch('/api/order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (response.ok) {
            alert("Замовлення успішне!");
            localStorage.removeItem('cart'); // Очищаємо після успіху
            window.location.href = "/";
        }
    });
});
</script>
</body>
</html>

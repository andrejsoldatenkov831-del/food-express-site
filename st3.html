<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформлення замовлення</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .order-box { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); padding: 40px; border-radius: 30px; width: 100%; max-width: 400px; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        h2 { text-align: center; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #ffeb3b; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: none; box-sizing: border-box; }
        .total { text-align: right; font-size: 20px; font-weight: bold; margin: 20px 0; }
        .confirm-btn { background: #ffeb3b; color: #333; border: none; width: 100%; padding: 18px; border-radius: 20px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .confirm-btn:hover { transform: scale(1.02); background: #fdd835; }
    </style>
</head>
<body>

<div class="order-box">
    <h2>Ваше замовлення</h2>
    <div id="cart-items"></div>
    <div class="total" id="total-price">Разом: 0 грн</div>

    <div class="input-group">
        <label>Ваше ім'я</label>
        <input type="text" id="name" placeholder="Введіть ім'я">
    </div>
    <div class="input-group">
        <label>Номер телефону</label>
        <input type="text" id="phone" placeholder="+380...">
    </div>
    <div class="input-group">
        <label>Адреса доставки</label>
        <input type="text" id="address" placeholder="Вулиця, будинок...">
    </div>

    <button class="confirm-btn" onclick="sendOrder()">ПІДТВЕРДИТИ</button>
</div>

<script>
    const cart = JSON.parse(sessionStorage.getItem('cart')) || [];
    const itemsDiv = document.getElementById('cart-items');
    const totalDiv = document.getElementById('total-price');
    let totalSum = 0;

    // Відображення товарів у кошику
    cart.forEach(item => {
        itemsDiv.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span>${item.name}</span><span>${item.price} грн</span>
        </div>`;
        totalSum += item.price;
    });
    totalDiv.innerText = `Разом: ${totalSum} грн`;

    async function sendOrder() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const address = document.getElementById('address').value;

        if (!name || !phone || !address || cart.length === 0) {
            alert("Заповніть всі поля та додайте товари!");
            return;
        }

        const orderData = {
            name: name,
            phone: phone,
            address: address,
            items: cart,
            total: totalSum
        };

        try {
            const response = await fetch('/api/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            });

            if (response.ok) {
                alert("Замовлення прийнято! Дякуємо.");
                sessionStorage.removeItem('cart'); // Очищуємо кошик
                window.location.href = '/'; // Повертаємо на головну
            } else {
                alert("Помилка на сервері. Спробуйте пізніше.");
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Не вдалося відправити замовлення.");
        }
    }
</script>

</body>
</html>
